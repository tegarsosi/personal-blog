{% extends "base.html" %}

{% block content %}
<article class="max-w-3xl mx-auto">
    <header class="mb-12 border-b-2 border-primary pb-8">
        <div class="flex justify-between items-end mb-6">
            <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-secondary">
                Published {{ article.created_at.strftime('%B %d, %Y') }}
            </span>
            {% if article.updated_at != article.created_at %}
            <span class="text-[10px] italic text-secondary">
                Updated {{ article.updated_at.strftime('%b %d') }}
            </span>
            {% endif %}
        </div>
        <h1 class="text-5xl font-black tracking-tighter leading-tight text-primary">
            {{ article.title }}
        </h1>
    </header>

    <div class="prose prose-stone lg:prose-xl max-w-none">
        <p class="text-l leading-relaxed text-primary whitespace-pre-wrap">{{ article. content }}</p>
    </div>

    <div class="mt-20 pt-10 border-t-2 border-primary">
        <a href="/" class="text-xs font-bold uppercase tracking-widest hover:underline">←Back to Archive
        </a>
    </div>
</article>
{% endblock %}
