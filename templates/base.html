<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Tegar's Portfolio | The Polished Ink</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "background": "#f9f9f9",
              "primary": "#000000",
              "secondary": "#5e5e5e",
              "surface-container-low": "#f3f3f3",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#c6c6c6",
            },
            fontFamily: { "body": ["Plus Jakarta Sans"] }
          }
        }
      }
    </script>
    <style>
        .scribble-texture {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10C30 15 20 40 50 30S70 10 90 20' stroke='%23000' stroke-width='0.5' fill='none' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-background text-primary font-body antialiased scribble-texture">
    <nav class="border-b-2 border-primary px-8 py-6 mb-12 bg-white/80 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-black tracking-tighter uppercase">Ink Portfolio</a>
            <div class="space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="/" class="hover:underline">Work</a>
                <a href="/admin" class="px-4 py-2 border-2 border-primary hover:bg-primary hover:text-white transition-colors">Admin</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-8 pb-24">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t-2 border-primary py-12 px-8 bg-white">
        <div class="max-w-6xl mx-auto flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-secondary">
            <p>© 2026 The Polished Ink. Hand-inked digital experience.</p>
            <div class="space-x-6">
                <a href="#" class="hover:underline">Twitter</a>
                <a href="#" class="hover:underline">Github</a>
            </div>
        </div>
    </footer>
</body>
</html>
