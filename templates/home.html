{% extends "base.html" %}

{% block content %}
    <h1>Latest Articles</h1>
    {% for article in articles %}
        <div>
            <h2>
                <a href="/article/{{ article.id }}">{{ article.title }}</a>
            </h2>
            <p>{{ article.published_at }}</p>
        </div>
    {% endfor %}
{% endblock %}
